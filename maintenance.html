<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAA — We'll Be Back</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF4500;
      --orange-light: #FF6347;
      --yellow: #FFD700;
      --dark: #000000;
      --dark-mid: #0d0d0d;
      --dark-card: #141414;
      --text-muted: rgba(255,255,255,0.5);
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.4;
    }

    /* ── AMBIENT GLOW ── */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      width: 600px; height: 600px;
      background: rgba(255, 69, 0, 0.12);
      top: -200px; left: -150px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .glow-2 {
      width: 400px; height: 400px;
      background: rgba(255, 215, 0, 0.06);
      bottom: -100px; right: -100px;
      animation: drift 16s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 30px); }
    }

    /* ── LAYOUT ── */
    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* ── LOGO AREA ── */
    .logo-lockup {
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }
    .logo-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 0.5rem;
    }
    .logo-wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--white);
    }
    .logo-wordmark span {
      color: var(--orange);
    }

    /* ── DIVIDER ── */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--orange);
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    /* ── HEADLINE ── */
    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.06em;
      line-height: 1.05;
      color: var(--white);
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.65s;
    }
    .headline em {
      font-style: normal;
      color: var(--orange);
    }

    /* ── SUBTEXT ── */
    .subtext {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      font-weight: 600;
      color: var(--text-muted);
      max-width: 440px;
      line-height: 1.7;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    /* ── STATUS PILL ── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--dark-card);
      border: 1px solid rgba(255,69,0,0.2);
      border-radius: 100px;
      padding: 0.45rem 1.1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.95s;
    }
    .pulse-dot {
      width: 7px; height: 7px;
      background: var(--orange);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── SOCIAL ROW ── */
    .social-row {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.1s;
    }
    .social-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: border-color 0.25s, color 0.25s, background 0.25s;
    }
    .social-link:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(255,69,0,0.08);
    }

    /* ── BOTTOM STRIP ── */
    .bottom-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--yellow), var(--orange));
      background-size: 200% 100%;
      animation: slide 3s linear infinite;
      z-index: 5;
    }
    @keyframes slide {
      0%   { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── FADE UP ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .social-label { display: none; }
    }
  </style>
</head>
<body>

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="bottom-strip"></div>

  <main class="stage">

    <div class="logo-lockup">
      <p class="logo-tag">Uganda's Anime Community</p>
      <h1 class="logo-wordmark">What <span>About</span> Anime</h1>
    </div>

    <div class="divider"></div>

    <h2 class="headline">
      Something<br><em>big</em> is loading.
    </h2>

    <p class="subtext">
      We're rebuilding the experience from the ground up. The new site is worth the wait — check back soon.
    </p>

    <div class="status-pill">
      <span class="pulse-dot"></span>
      Under maintenance — back shortly
    </div>

    <div class="social-row">
      <span class="social-label">Follow the updates</span>

      <!-- Instagram -->
      <a href="https://www.instagram.com/whataboutanimee/" target="_blank" rel="noopener" class="social-link" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
      </a>

      <!-- TikTok -->
      <a href="https://www.tiktok.com/@whataboutanimee?lang=en" target="_blank" rel="noopener" class="social-link" aria-label="TikTok">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/>
        </svg>
      </a>

      <!-- YouTube -->
      <a href="https://www.youtube.com/@whataboutanimeee" target="_blank" rel="noopener" class="social-link" aria-label="YouTube">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31.4 31.4 0 0 0 0 12a31.4 31.4 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31.4 31.4 0 0 0 24 12a31.4 31.4 0 0 0-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/>
        </svg>
      </a>
    </div>

  </main>

</body>
</html>
